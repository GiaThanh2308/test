<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vi phạm - AI School</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="logo">
          <i class="fa-solid fa-school"></i>
          <span>AI School</span>
        </div>

        <ul class="menu">
          <li>
            <a href="dashboard.html"
              ><i class="fa-solid fa-chart-line"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="students.html"
              ><i class="fa-solid fa-user-graduate"></i> Học sinh</a
            >
          </li>
          <li class="active">
            <a href="violations.html"
              ><i class="fa-solid fa-triangle-exclamation"></i> Vi phạm</a
            >
          </li>
          <li>
            <a href="stats.html"
              ><i class="fa-solid fa-chart-bar"></i> Thống kê</a
            >
          </li>
          <li>
            <a href="chatbot.html"
              ><i class="fa-solid fa-robot"></i> Chatbot AI</a
            >
          </li>
        </ul>
      </aside>

      <main class="main">
        <header class="topbar">
          <h1>Quản lý vi phạm</h1>
        </header>

        <div class="table-card">
          <div style="padding: 20px; display: flex; gap: 10px; flex-wrap: wrap">
            <input
              type="text"
              placeholder="Tìm học sinh..."
              style="padding: 10px; border: 1px solid #ddd; border-radius: 8px"
            />

            <select
              style="padding: 10px; border: 1px solid #ddd; border-radius: 8px"
            >
              <option>Tất cả mức độ</option>
              <option>Nhẹ</option>
              <option>Trung bình</option>
              <option>Nghiêm trọng</option>
            </select>
          </div>

          <table>
            <thead>
              <tr>
                <th>Học sinh</th>
                <th>Lớp</th>
                <th>Vi phạm</th>
                <th>Mức độ</th>
                <th>Thời gian</th>
              </tr>
            </thead>

            <tbody id="violationsTable">
              <tr>
                <td>Nguyễn Văn A</td>
                <td>11A1</td>
                <td>Đi học muộn</td>
                <td><span class="badge warning">Nhẹ</span></td>
                <td>08:12 12/06/2026</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/violations.js"></script>
  </body>
</html>
