<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thống kê - AI School</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="logo">
          <i class="fa-solid fa-school"></i>
          <span>AI School</span>
        </div>

        <ul class="menu">
          <li>
            <a href="dashboard.html"
              ><i class="fa-solid fa-chart-line"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="students.html"
              ><i class="fa-solid fa-user-graduate"></i> Học sinh</a
            >
          </li>
          <li>
            <a href="violations.html"
              ><i class="fa-solid fa-triangle-exclamation"></i> Vi phạm</a
            >
          </li>
          <li class="active">
            <a href="stats.html"
              ><i class="fa-solid fa-chart-bar"></i> Thống kê</a
            >
          </li>
          <li>
            <a href="chatbot.html"
              ><i class="fa-solid fa-robot"></i> Chatbot AI</a
            >
          </li>
        </ul>
      </aside>

      <main class="main">
        <header class="topbar">
          <h1>Thống kê hệ thống</h1>
        </header>

        <section class="stats">
          <div class="stat-card green">
            <span>Tổng học sinh</span>
            <h2 id="totalStudents">0</h2>
          </div>

          <div class="stat-card red">
            <span>Tổng vi phạm</span>
            <h2 id="totalViolations">0</h2>
          </div>

          <div class="stat-card blue">
            <span>Tuần này</span>
            <h2 id="weekViolations">0</h2>
          </div>

          <div class="stat-card amber">
            <span>Tháng này</span>
            <h2 id="monthViolations">0</h2>
          </div>
        </section>

        <div class="card">
          <h2>
            <i class="fa-solid fa-chart-column"></i>
            Thống kê theo loại vi phạm
          </h2>

          <div
            id="chartArea"
            style="
              height: 350px;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            Biểu đồ sẽ hiển thị ở đây
          </div>
        </div>
      </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/stats.js"></script>
  </body>
</html>
